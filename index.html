
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal 901 | Digital Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        /* Efeito 3D nos Balões */
        .card-3d {
            transition: all 0.3s ease;
            box-shadow: 8px 8px 16px rgba(0, 0, 0, 0.05), -4px -4px 12px rgba(255, 255, 255, 0.8);
        }
        .dark .card-3d {
            box-shadow: 10px 10px 20px rgba(0, 0, 0, 0.4), -2px -2px 10px rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .card-3d:hover {
            transform: translateY(-5px) scale(1.01);
            box-shadow: 12px 12px 24px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="bg-[#f0f2f5] dark:bg-[#0f172a] transition-colors duration-500 font-sans">

    <div id="loginScreen" class="min-h-screen flex items-center justify-center bg-blue-600 dark:bg-[#020617] p-6">
        <div class="bg-white dark:bg-[#1e293b] rounded-[3rem] p-12 w-full max-w-sm text-center card-3d">
            <div class="text-blue-600 dark:text-blue-400 text-7xl mb-6">
                <i class="fas fa-book-open"></i>
            </div>
            <h2 class="text-3xl font-black mb-10 text-slate-800 dark:text-white uppercase tracking-tight">Portal 901</h2>
            
            <div class="space-y-4">
                <button onclick="entrar('aluno')" class="w-full py-5 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-bold text-lg shadow-lg transition-all active:scale-95">
                    Entrar como Aluno
                </button>
                <button onclick="entrarAdmin()" class="w-full py-4 bg-slate-100 dark:bg-[#334155] text-slate-600 dark:text-slate-300 rounded-2xl font-bold transition-all active:scale-95">
                    Representante
                </button>
            </div>
        </div>
    </div>

    <div id="mainScreen" class="hidden min-h-screen">
        <nav class="sticky top-0 z-50 bg-white/80 dark:bg-[#1e293b]/80 backdrop-blur-lg border-b border-slate-200 dark:border-slate-800 p-5">
            <div class="container mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <span class="bg-blue-600 text-white px-3 py-1 rounded-lg font-black">901</span>
                    <h1 class="text-xl font-bold text-slate-800 dark:text-white">MURAL DIGITAL</h1>
                </div>
                <button onclick="location.reload()" class="h-12 w-12 bg-red-50 dark:bg-red-950/30 text-red-500 rounded-2xl flex items-center justify-center transition-all hover:bg-red-500 hover:text-white">
                    <i class="fas fa-power-off"></i>
                </button>
            </div>
        </nav>

        <main class="container mx-auto px-6 py-10 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="mural"></main>
    </div>

    <script>
        // FIREBASE CONFIG
        const firebaseConfig = { databaseURL: "https://project-646369015746153540-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        // SENHA
        const MINHA_SENHA_SECRETA = "esquilo voador"; 

        const categorias = [
            {id: 'horario', nome: 'Horário de Aula', icon: 'fa-calendar-day'},
            {id: 'dever', nome: 'Dever de Casa', icon: 'fa-pencil-square'},
            {id: 'provas', nome: 'Calendário de Provas', icon: 'fa-triangle-exclamation'},
            {id: 'avisos', nome: 'Recados Gerais', icon: 'fa-message'},
            {id: 'notas', nome: 'Resultados', icon: 'fa-award'},
            {id: 'extra', nome: 'Materiais Extras', icon: 'fa-box-archive'}
        ];

        const mural = document.getElementById('mural');
        categorias.forEach(cat => {
            mural.innerHTML += `
                <div class="card-3d bg-white dark:bg-[#1e293b] rounded-[2.5rem] p-8 relative overflow-hidden group">
                    <div class="flex justify-between items-center mb-6">
                        <div class="bg-blue-50 dark:bg-blue-900/20 p-4 rounded-2xl text-blue-600 dark:text-blue-400">
                            <i class="fas ${cat.icon} text-2xl"></i>
                        </div>
                        <button id="btn${cat.id}" onclick="salvar('${cat.id}')" class="hidden bg-slate-900 dark:bg-blue-600 text-white text-[10px] font-bold px-4 py-2 rounded-full shadow-md">EDITAR</button>
                    </div>
                    <h3 class="text-xs font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-3">${cat.nome}</h3>
                    <div id="${cat.id}Texto" class="text-slate-700 dark:text-slate-200 font-medium text-base whitespace-pre-wrap leading-relaxed">Sincronizando...</div>
                    <textarea id="${cat.id}Input" class="hidden w-full mt-3 p-5 rounded-2xl bg-slate-50 dark:bg-[#0f172a] dark:text-white border-none focus:ring-2 focus:ring-blue-500 h-40 shadow-inner"></textarea>
                </div>`;

            db.ref('sala/' + cat.id).on('value', snap => {
                const val = snap.val() || "Vazio por enquanto.";
                document.getElementById(cat.id + 'Texto').innerText = val;
                document.getElementById(cat.id + 'Input').value = val === "Vazio por enquanto." ? "" : val;
            });
        });

        function entrar(tipo) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainScreen').classList.remove('hidden');
            if(tipo === 'admin') {
                document.querySelectorAll('[id^="btn"]').forEach(b => b.classList.remove('hidden'));
            }
        }

        function entrarAdmin() {
            const pass = prompt("Autenticação do Representante:"); 
            if(pass === MINHA_SENHA_SECRETA) entrar('admin');
            else alert("Chave incorreta.");
        }

        function salvar(id) {
            const txt = document.getElementById(id + 'Texto');
            const inp = document.getElementById(id + 'Input');
            const btn = document.getElementById('btn' + id);
            
            if(inp.classList.contains('hidden')) {
                txt.classList.add('hidden'); inp.classList.remove('hidden');
                btn.innerText = "CONCLUIR";
                btn.classList.replace('bg-slate-900', 'bg-green-600');
            } else {
                db.ref('sala/' + id).set(inp.value);
                txt.classList.remove('hidden'); inp.classList.add('hidden');
                btn.innerText = "EDITAR";
                btn.classList.replace('bg-green-600', 'bg-slate-900');
            }
        }
    </script>
</body>
</html>
