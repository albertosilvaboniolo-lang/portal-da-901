<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal 901 | Digital Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        /* Livrinho Pulando Clássico */
        .animate-bounce-slow { animation: bounce 2s infinite; }
        @keyframes bounce {
            0%, 100% { transform: translateY(-15%); }
            50% { transform: none; }
        }

        /* EFEITO GLOW 3D PREMIUM */
        .card-glow {
            background: #ffffff;
            border-radius: 2.5rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(59, 130, 246, 0.3);
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.3), 0 0 15px rgba(59, 130, 246, 0.1);
            position: relative;
            overflow: hidden;
        }

        .card-glow:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px -10px rgba(59, 130, 246, 0.5), 0 0 25px rgba(59, 130, 246, 0.2);
        }

        /* MODO ESCURO AUTOMÁTICO */
        @media (prefers-color-scheme: dark) {
            body { background-color: #0f172a !important; }
            .card-glow { 
                background: #1e293b !important; 
                border-color: #3b82f6 !important;
                box-shadow: 0 0 25px rgba(59, 130, 246, 0.4) !important;
                color: white !important;
            }
            .text-slate-800, .text-slate-600 { color: #f1f5f9 !important; }
            nav { background: #1e293b !important; color: white !important; border-bottom: 1px solid #334155 !important; }
        }

        /* Animação de subida dos cards */
        .fade-up { animation: fadeUp 0.6s ease forwards; opacity: 0; }
        @keyframes fadeUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body class="bg-[#f8fafc] font-sans">

    <div id="loginScreen" class="min-h-screen flex items-center justify-center bg-blue-600 p-6">
        <div class="card-glow p-12 w-full max-w-sm text-center">
            <div class="text-blue-600 text-7xl mb-6 animate-bounce-slow">
                <i class="fas fa-book-open"></i>
            </div>
            <h2 class="text-3xl font-black mb-10 uppercase text-slate-800">Portal 901</h2>
            <div class="space-y-4">
                <button onclick="entrar('aluno')" class="w-full py-5 bg-blue-600 text-white rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition">Acesso do Aluno</button>
                <button onclick="entrarAdmin()" class="w-full py-3 text-slate-400 font-bold text-xs uppercase tracking-widest hover:text-blue-500 transition">Acesso do Administrador</button>
            </div>
        </div>
    </div>

    <div id="mainScreen" class="hidden min-h-screen">
        <nav class="sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b p-5 flex justify-between items-center shadow-sm">
            <div class="flex items-center gap-3">
                <span class="bg-blue-600 text-white px-3 py-1 rounded-lg font-black shadow-md">901</span>
                <h1 class="text-xl font-bold uppercase italic tracking-tight">Mural Digital</h1>
            </div>
            <button onclick="location.reload()" class="h-10 w-10 flex items-center justify-center bg-red-50 text-red-500 rounded-xl hover:bg-red-500 hover:text-white transition"><i class="fas fa-power-off"></i></button>
        </nav>

        <header class="p-6" id="headerBanner">
            <div id="notif-banner" onclick="ativarNotificacoes()" class="bg-gradient-to-r from-blue-600 to-indigo-700 p-5 rounded-[2rem] flex items-center justify-between cursor-pointer shadow-xl transform active:scale-95 transition-all">
                <div class="flex items-center gap-4 text-white text-left">
                    <div class="bg-white/20 p-3 rounded-full"><i class="fas fa-bell animate-pulse text-xl"></i></div>
                    <div>
                        <p class="font-bold text-base tracking-tight">Ficar por dentro de tudo?</p>
                        <p class="text-xs opacity-80">Clique aqui para ativar as notificações.</p>
                    </div>
                </div>
                <i class="fas fa-arrow-right text-white/50 mr-2"></i>
            </div>
        </header>

        <main class="container mx-auto px-6 pb-24 grid grid-cols-1 md:grid-cols-2 gap-8" id="mural"></main>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://project-646369015746153540-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const SENHA_ADMIN = "esquilo";

        const categorias = [
            {id: 'horario', nome: 'Horário de Aula', icon: 'fa-calendar-day'},
            {id: 'dever', nome: 'Dever de Casa', icon: 'fa-pencil-alt'},
            {id: 'provas', nome: 'Datas de Provas', icon: 'fa-triangle-exclamation'},
            {id: 'avisos', nome: 'Recados Gerais', icon: 'fa-bullhorn'}
        ];

        function renderMural() {
            const mural = document.getElementById('mural');
            mural.innerHTML = '';
            categorias.forEach((cat, index) => {
                mural.innerHTML += `
                    <div class="card-glow p-8 fade-up" style="animation-delay: ${index * 0.1}s">
                        <div class="flex items-center gap-4 mb-6">
                            <div class="w-14 h-14 bg-blue-50 dark:bg-blue-900/30 rounded-2xl flex items-center justify-center text-blue-600">
                                <i class="fas ${cat.icon} text-2xl"></i>
                            </div>
                            <h3 class="font-black uppercase text-sm tracking-widest">${cat.nome}</h3>
                        </div>
                        <div id="${cat.id}Texto" class="text-slate-700 dark:text-slate-300 font-medium whitespace-pre-wrap leading-relaxed border-t border-blue-100 dark:border-slate-700 pt-5 text-lg">Sincronizando...</div>
                        <div id="admin-${cat.id}" class="hidden mt-6 space-y-4">
                            <textarea id="${cat.id}Input" class="w-full p-5 rounded-2xl bg-slate-50 dark:bg-slate-900/50 border-2 border-blue-100 dark:border-blue-900 h-44 outline-none focus:border-blue-500 transition text-slate-800 dark:text-white"></textarea>
                            <button onclick="salvar('${cat.id}')" class="w-full py-4 bg-blue-600 text-white rounded-xl font-bold uppercase text-xs shadow-lg active:bg-blue-700 transition">Salvar Mudanças</button>
                        </div>
                    </div>`;

                db.ref('sala/' + cat.id).on('value', snap => {
                    const val = snap.val() || "Nada postado ainda.";
                    if(document.getElementById(cat.id + 'Texto')) {
                        document.getElementById(cat.id + 'Texto').innerText = val;
                        document.getElementById(cat.id + 'Input').value = (val === "Nada postado ainda.") ? "" : val;
                    }
                });
            });
        }

        function entrar(tipo) {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainScreen').classList.remove('hidden');
            renderMural();
            // Verifica se já aceitou notificações antes para esconder o banner
            if (localStorage.getItem('notifAceita') === 'true') {
                document.getElementById('headerBanner').style.display = 'none';
            }
            if(tipo === 'admin') {
                setTimeout(() => {
                    document.querySelectorAll('[id^="admin-"]').forEach(el => el.classList.remove('hidden'));
                    document.querySelectorAll('[id$="Texto"]').forEach(el => el.classList.add('hidden'));
                }, 200);
            }
        }

        function entrarAdmin() {
            if(prompt("Senha do Administrador:") === SENHA_ADMIN) entrar('admin');
            else alert("Senha Incorreta!");
        }

        function salvar(id) {
            const val = document.getElementById(id + 'Input').value;
            db.ref('sala/' + id).set(val).then(() => {
                alert("Mural atualizado!");
            });
        }

        function ativarNotificacoes() {
            Notification.requestPermission().then(perm => {
                if(perm === 'granted') {
                    alert("Avisos ativados com sucesso!");
                }
                // Independente da escolha, some com o banner e salva a decisão
                document.getElementById('headerBanner').style.display = 'none';
                localStorage.setItem('notifAceita', 'true');
            });
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
