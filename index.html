<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal 901 | Digital Hub</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icone.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <style>
        body { background-color: #0f172a; color: #ffffff; font-family: system-ui, sans-serif; margin: 0; }

        /* EFEITO GLOW NAS BORDAS */
        .card-glow {
            background-color: #1e293b;
            border-radius: 2.5rem;
            border: 2px solid #3b82f6;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
            transition: all 0.3s ease;
        }

        .card-glow:hover {
            box-shadow: 0 0 35px rgba(59, 130, 246, 0.6);
            transform: translateY(-5px);
        }

        /* BANNER DE INSTALAÇÃO NO TOPO */
        #pwa-banner {
            position: fixed; top: 15px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 480px; z-index: 9999;
            background-color: rgba(30, 41, 59, 0.95); backdrop-filter: blur(12px);
            padding: 16px; border-radius: 24px; display: flex; align-items: center;
            justify-content: space-between; gap: 15px; border: 1px solid #3b82f6;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .modal-overlay {
            position: fixed; inset: 0; background-color: rgba(0, 0, 0, 0.9);
            z-index: 10000; display: none; align-items: center; justify-content: center; padding: 20px;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
            50% { box-shadow: 0 0 30px rgba(59, 130, 246, 0.7); }
        }
        .animate-glow { animation: pulse-glow 3s infinite; }
    </style>
</head>
<body>

    <div id="pwa-banner" class="hidden">
        <div class="flex items-center gap-4">
            <div class="bg-blue-600 h-12 w-12 rounded-2xl flex items-center justify-center animate-glow">
                <i class="fas fa-book-open text-white"></i>
            </div>
            <div>
                <p class="text-sm font-bold text-white">Portal 901 no Celular</p>
                <button onclick="document.getElementById('modal-ajuda').style.display='flex'" class="text-xs text-blue-400 font-black uppercase underline">Como Instalar?</button>
            </div>
        </div>
        <button onclick="fecharBannerPWA()" class="text-slate-400 p-2"><i class="fas fa-times"></i></button>
    </div>

    <div id="modal-ajuda" class="modal-overlay" onclick="this.style.display='none'">
        <div class="card-glow p-10 max-w-sm w-full text-center" onclick="event.stopPropagation()">
            <h3 class="text-2xl font-black mb-6 uppercase italic">Passo a Passo</h3>
            <div class="text-left space-y-4 text-slate-300">
                <p>1. Clique no botão <b>Compartilhar</b> ou nos <b>três pontinhos</b>.</p>
                <p>2. Clique em <b>"Adicionar à Tela de Início"</b>.</p>
                <p>3. Pronto! O Portal 901 virou um App.</p>
            </div>
            <button onclick="document.getElementById('modal-ajuda').style.display='none'" class="mt-8 w-full py-5 bg-blue-600 text-white rounded-3xl font-black">ENTENDI!</button>
        </div>
    </div>

    <div id="loginScreen" class="min-h-screen flex items-center justify-center p-6 bg-slate-950">
        <div class="card-glow p-12 w-full max-w-sm text-center">
            <i class="fas fa-book-open text-blue-500 text-8xl mb-8"></i>
            <h2 class="text-4xl font-black mb-12 uppercase italic tracking-tighter text-white">Portal 901</h2>
            <button onclick="fazerLogin('aluno')" class="w-full py-6 bg-blue-600 text-white rounded-[2rem] font-black text-xl mb-4 animate-glow">Acesso Aluno</button>
            <button onclick="pedirSenhaAdmin()" class="w-full py-3 text-slate-500 font-bold text-xs uppercase tracking-widest">Área Admin</button>
        </div>
    </div>

    <div id="mainScreen" class="hidden min-h-screen">
        <nav class="sticky top-0 z-50 bg-slate-900/90 backdrop-blur-xl border-b border-blue-900/50 p-6 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <span class="bg-blue-600 text-white px-3 py-1 rounded-lg font-black">901</span>
                <h1 class="text-2xl font-black uppercase italic">Mural Digital</h1>
            </div>
            <button onclick="location.reload()" class="h-12 w-12 text-red-500 border border-red-500/30 rounded-2xl"><i class="fas fa-power-off"></i></button>
        </nav>

        <div id="container-admin-add" class="hidden px-6 pt-10 max-w-6xl mx-auto w-full">
            <button onclick="criarNovaCategoria()" class="w-full py-6 bg-green-600/10 border-2 border-dashed border-green-500 text-green-500 rounded-[2.5rem] font-black uppercase flex items-center justify-center gap-3">
                <i class="fas fa-plus-circle text-xl"></i> ADICIONAR NOVO BLOCO
            </button>
        </div>

        <main class="container mx-auto px-6 py-10 grid grid-cols-1 md:grid-cols-2 gap-10 max-w-6xl" id="mural-container"></main>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://project-646369015746153540-default-rtdb.firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        let usuarioEhAdmin = false;

        // BLOCOS FIXOS QUE VOCÊ PEDIU
        const blocosFixos = {
            'horario': { nome: 'Horário de Aula', icon: 'fa-clock' },
            'provas': { nome: 'Data de Prova', icon: 'fa-file-signature' },
            'avisos': { nome: 'Avisos Importantes', icon: 'fa-triangle-exclamation' },
            'deveres': { nome: 'Deveres de Casa', icon: 'fa-book' },
            'professores': { nome: 'Professores', icon: 'fa-user-tie' }
        };

        function fazerLogin(tipo) {
            usuarioEhAdmin = (tipo === 'admin');
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainScreen').classList.remove('hidden');
            if(usuarioEhAdmin) document.getElementById('container-admin-add').classList.remove('hidden');
            if (!localStorage.getItem('pwa_visto_901')) document.getElementById('pwa-banner').classList.remove('hidden');
            carregarMural();
        }

        function pedirSenhaAdmin() {
            if (prompt("Senha do Admin:") === "esquilo") fazerLogin('admin');
        }

        function carregarMural() {
            database.ref('categorias').on('value', function(snapshot) {
                let categoriasExtras = snapshot.val() || {};
                
                // Unir os blocos fixos com os que você criar no (+)
                const todasCategorias = { ...blocosFixos, ...categoriasExtras };

                const muralHtml = document.getElementById('mural-container');
                muralHtml.innerHTML = '';

                Object.keys(todasCategorias).forEach(function(chave) {
                    const cat = todasCategorias[chave];
                    const ehFixo = blocosFixos[chave] ? true : false;

                    muralHtml.innerHTML += `
                        <div class="card-glow p-8 relative">
                            ${usuarioEhAdmin && !ehFixo ? `<button onclick="deletarCategoria('${chave}')" class="absolute top-6 right-6 text-red-500/40"><i class="fas fa-trash"></i></button>` : ''}
                            <div class="flex items-center gap-4 mb-6">
                                <i class="fas ${cat.icon} text-2xl text-blue-400"></i>
                                <h3 class="font-black uppercase tracking-widest">${cat.nome}</h3>
                            </div>
                            <div id="texto-${chave}" class="text-slate-300 border-t border-white/5 pt-6 text-xl min-h-[80px] whitespace-pre-wrap">Carregando...</div>
                            <div id="editor-${chave}" class="${usuarioEhAdmin ? 'block' : 'hidden'} mt-6">
                                <textarea id="input-${chave}" class="w-full p-4 rounded-2xl bg-slate-900 border border-blue-500/20 text-white h-32 outline-none mb-2 focus:border-blue-500"></textarea>
                                <button onclick="salvarAlteracao('${chave}')" class="w-full py-4 bg-blue-600 rounded-xl font-black uppercase text-xs">Atualizar</button>
                            </div>
                        </div>`;

                    database.ref('sala/' + chave).on('value', function(snapTexto) {
                        const txt = snapTexto.val() || "Vazio.";
                        if(document.getElementById('texto-' + chave)) document.getElementById('texto-' + chave).innerText = txt;
                        if(usuarioEhAdmin && document.getElementById('input-' + chave)) document.getElementById('input-' + chave).value = txt;
                    });
                });
            });
        }

        function criarNovaCategoria() {
            const nome = prompt("Nome do novo bloco:");
            if (nome) {
                const id = 'custom-' + nome.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/\s+/g, '-');
                database.ref('categorias/' + id).set({ nome: nome, icon: 'fa-star' });
                database.ref('sala/' + id).set("Edite aqui.");
            }
        }

        function deletarCategoria(id) {
            if (confirm("Apagar este bloco?")) {
                database.ref('categorias/' + id).remove();
                database.ref('sala/' + id).remove();
            }
        }

        function salvarAlteracao(id) {
            const val = document.getElementById('input-' + id).value;
            database.ref('sala/' + id).set(val).then(() => alert("Atualizado!"));
        }

        function fecharBannerPWA() {
            document.getElementById('pwa-banner').style.display = 'none';
            localStorage.setItem('pwa_visto_901', 'true');
        }

        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
